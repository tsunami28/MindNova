openapi: 3.0.3
info:
  title: MindNova Availability API
  description: Therapist availability block management for the MindNova platform.
  version: 1.0.0

servers:
  - url: /api
    description: Relative base path

security:
  - bearerAuth: []

paths:
  /availability:
    post:
      operationId: createAvailabilityBlock
      summary: Create a new availability block for a therapist
      tags: [Availability]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAvailabilityBlockRequest'
      responses:
        '200':
          description: Created block or validation error (ProblemDetails)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AvailabilityBlockResponse'
                  - $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Missing or invalid authentication token
    get:
      operationId: listAvailabilityBlocks
      summary: List availability blocks for a therapist
      tags: [Availability]
      parameters:
        - name: therapist_id
          in: query
          required: true
          description: Filter by therapist (ApplicationUser ID)
          schema:
            type: string
      responses:
        '200':
          description: List of availability blocks for the therapist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailabilityBlockResponse'
        '401':
          description: Missing or invalid authentication token

  /availability/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Availability block identifier
        schema:
          type: string
          format: uuid
    get:
      operationId: getAvailabilityBlock
      summary: Get a single availability block by ID
      tags: [Availability]
      responses:
        '200':
          description: Block data or not-found error (ProblemDetails)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AvailabilityBlockResponse'
                  - $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Missing or invalid authentication token
    put:
      operationId: updateAvailabilityBlock
      summary: Update an availability block
      tags: [Availability]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAvailabilityBlockRequest'
      responses:
        '200':
          description: Updated block or error (ProblemDetails)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AvailabilityBlockResponse'
                  - $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Missing or invalid authentication token
    delete:
      operationId: deleteAvailabilityBlock
      summary: Delete an availability block
      tags: [Availability]
      responses:
        '200':
          description: Deletion confirmation or not-found error (ProblemDetails)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DeleteConfirmation'
                  - $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Missing or invalid authentication token

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateAvailabilityBlockRequest:
      type: object
      required: [TherapistUserId, StartTime, EndTime, IsRecurring, EffectiveFrom]
      properties:
        TherapistUserId:
          type: string
        DayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: "0=Sunday through 6=Saturday (required when IsRecurring=true)"
        StartTime:
          type: string
          format: time
          description: "HH:mm:ss format"
        EndTime:
          type: string
          format: time
          description: "HH:mm:ss format"
        EffectiveFrom:
          type: string
          format: date
        EffectiveTo:
          type: string
          format: date
          description: Nullable for open-ended recurring blocks
        IsRecurring:
          type: boolean
        SpecificDate:
          type: string
          format: date
          description: Required when IsRecurring=false (one-off block)

    UpdateAvailabilityBlockRequest:
      type: object
      properties:
        DayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        StartTime:
          type: string
          format: time
        EndTime:
          type: string
          format: time
        EffectiveFrom:
          type: string
          format: date
        EffectiveTo:
          type: string
          format: date
        IsRecurring:
          type: boolean
        SpecificDate:
          type: string
          format: date

    AvailabilityBlockResponse:
      type: object
      properties:
        Id:
          type: string
          format: uuid
        TherapistUserId:
          type: string
        DayOfWeek:
          type: integer
          description: "0=Sunday through 6=Saturday, null for one-off blocks"
        StartTime:
          type: string
          format: time
        EndTime:
          type: string
          format: time
        EffectiveFrom:
          type: string
          format: date
        EffectiveTo:
          type: string
          format: date
        IsRecurring:
          type: boolean
        SpecificDate:
          type: string
          format: date
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time

    DeleteConfirmation:
      type: object
      properties:
        Id:
          type: string
          format: uuid
        Deleted:
          type: boolean

    ProblemDetails:
      type: object
      description: RFC 7807 error response (returned with HTTP 200 per C07)
      properties:
        Title:
          type: string
        Detail:
          type: string
        Status:
          type: integer
          description: Semantic status code (400 for validation, 404 for not found)
        Type:
          type: string
        Instance:
          type: string
